# SE職 二次応募/追加募集 監視設定

notify_email: m.shinoharaforrecruit@gmail.com

# 監視間隔（秒）- ローカル実行時のデフォルト
check_interval_seconds: 3600

# 二次応募・追加募集を示すキーワード
secondary_keywords:
  - 二次応募
  - 追加募集
  - 再募集
  - 追加入手
  - エントリー再開
  - 選考再開
  - 追加エントリー
  - 追加選考
  - 欠員募集
  - 増員募集

# SE職を示すキーワード（単独の "SE" は SEMINAR 等と誤判定するため除外）
se_keywords:
  - SE職
  - システムエンジニア
  - ソリューションエンジニア
  - エリア職システムエンジニア
  - ITエンジニア
  - 情報システム
  - 開発職

